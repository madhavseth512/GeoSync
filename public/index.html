<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoSync</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <!-- Leaflet.draw — polygon/rectangle drawing toolbar -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
    crossorigin=""
  />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── Screen 1: Auth (Login / Register) ────────────── -->
  <div id="auth-screen">
    <div class="auth-card">
      <h1>GeoSync</h1>
      <p class="subtitle">Real-time location sharing</p>

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form">
        <input type="text" id="login-username" placeholder="Username" autocomplete="username" required />
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
        <div class="form-error" id="login-error"></div>
        <button type="submit">Login</button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="auth-form hidden">
        <input type="text" id="reg-username" placeholder="Username (3–50 chars, letters/numbers/_)" autocomplete="username" required />
        <input type="password" id="reg-password" placeholder="Password (min 8 characters)" autocomplete="new-password" required />
        <div class="form-error" id="register-error"></div>
        <button type="submit">Create Account</button>
      </form>
    </div>
  </div>

  <!-- ── Screen 2: Room (Create / Join) ───────────────── -->
  <div id="room-screen" class="hidden">
    <div class="room-card">
      <h2>Welcome, <span id="welcome-username"></span></h2>
      <p class="welcome">Create a new room or join an existing one.</p>

      <div class="room-section">
        <h3>Create a room</h3>
        <button class="create-btn" id="create-room-btn">Generate Room Code</button>
        <div class="room-code-display" id="room-code-display">
          <p>Share this code with others</p>
          <div class="code" id="generated-code"></div>
          <button class="join-btn" style="margin-top:12px;width:100%" id="enter-created-room-btn">Enter Room</button>
        </div>
      </div>

      <div class="room-section">
        <h3>Join a room</h3>
        <div class="join-row">
          <input type="text" id="join-code-input" placeholder="Enter code" maxlength="6" />
          <button class="join-btn" id="join-room-btn">Join</button>
        </div>
        <div class="room-error" id="room-error"></div>
      </div>

      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
  </div>

  <!-- ── Screen 3: Map ─────────────────────────────────── -->
  <div id="map-screen" class="hidden">
    <div id="map"></div>
    <div id="room-info">Room: <span id="active-room-code"></span></div>
    <div id="user-count">Connected: 0</div>

    <!-- View mode toggle — Live (markers + drawing) vs Heatmap (density layer) -->
    <div id="view-mode-toggle">
      <button class="mode-btn active" id="view-live">Live</button>
      <button class="mode-btn" id="view-heatmap">Heatmap</button>
    </div>

    <!-- Draw mode toggle — shown only in Live mode -->
    <div id="draw-mode-toggle">
      <button class="mode-btn active" id="mode-map-draw">Draw on Map</button>
      <button class="mode-btn" id="mode-walk-boundary">Walk Boundary</button>
    </div>

    <!-- Heatmap controls — shown only in Heatmap mode -->
    <div id="heatmap-controls" class="hidden">
      <label for="heatmap-range">Range:</label>
      <select id="heatmap-range">
        <option value="1">Last 1 hour</option>
        <option value="6" selected>Last 6 hours</option>
        <option value="24">Last 24 hours</option>
      </select>
      <span id="heatmap-spinner" class="hidden"><span class="spinner"></span> Loading…</span>
    </div>

    <!-- Walk Boundary controls — shown only in walk mode -->
    <div id="walk-controls" class="hidden">
      <button id="walk-start-btn">Start Recording</button>
      <span id="walk-counter" class="hidden"><span class="rec-dot"></span> Recording — <span id="walk-point-count">0</span> points</span>
      <button id="walk-undo-btn" class="hidden">Undo</button>
      <button id="walk-save-btn" class="hidden" disabled>Close &amp; Save</button>
      <button id="walk-cancel-btn" class="hidden">Cancel</button>
    </div>

    <div id="sidebar">
      <h4>In this room</h4>
      <ul id="user-list"></ul>
      <button id="clear-route-btn" style="display:none">Clear Route</button>

      <!-- Alert history panel — last 10 geofence enter/exit events -->
      <div id="alert-panel" class="hidden">
        <h4>Alerts</h4>
        <ul id="alert-list"></ul>
      </div>
    </div>

    <div id="toast"></div>

    <!-- Zone name modal — appears after drawing a polygon (either mode) -->
    <div id="zone-modal" class="hidden">
      <div id="zone-modal-box">
        <p>Name this zone</p>
        <input type="text" id="zone-name-input" placeholder="e.g. Campus, Danger Zone" maxlength="100" />
        <div id="zone-modal-actions">
          <button id="zone-cancel-btn">Cancel</button>
          <button id="zone-save-btn">Save Zone</button>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <!-- Leaflet.draw — must load after Leaflet -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"
    crossorigin=""
  ></script>
  <!-- Leaflet.heat — density heatmap layer, must load after Leaflet -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"
    crossorigin=""
  ></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
